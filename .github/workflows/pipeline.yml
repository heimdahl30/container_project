name: Deployment

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  build_and_test:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: '6.0'

      - name: Run Backend Unit Tests
        run: |
          npm ci
          npm run lint
          npm test
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27017/test_db
          PORT: 3003
          NODE_ENV: test
          SECRET: ${{ secrets.SECRET }}

    # 4. Run Frontend Component Tests
      - name: Run Frontend Component Tests (Vitest)
        run: |
          npm install --legacy-peer-deps
          npm run lint
          npm test -- --watch=false # Ensure Vitest doesn't hang in "watch" mode
        working-directory: frontend

      - name: Start App for Testing
        run: |
          NODE_ENV=test docker compose -f docker-compose.dev.yml up -d --build
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          SECRET: ${{secrets.SECRET}}

      - name: Wait for services to be ready
        run: |
          echo "Waiting for nginx to be ready on port 8080..."
          timeout 120 bash -c 'until curl -f http://localhost:8080 > /dev/null 2>&1; do sleep 2; done'
          echo "Services are ready!"

      - name: Check running containers
        run: docker ps

      - name: Install Playwright dependencies
        run: |
          npm ci
          npm run lint
        working-directory: playwright_blogtesting

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        working-directory: playwright_blogtesting

    # 5. Run Playwright Tests
      - name: Run Playwright tests
        timeout-minutes: 20
        run: npm run test
        working-directory: playwright_blogtesting

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright_blogtesting/playwright-report/
          retention-days: 30

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose -f docker-compose.dev.yml logs server
          echo "=== Frontend logs ==="
          docker compose -f docker-compose.dev.yml logs app
          echo "=== Nginx logs ==="
          docker compose -f docker-compose.dev.yml logs nginx

      - name: Clean up Docker containers
        if: always()
        run: docker compose -f docker-compose.dev.yml down --volumes
